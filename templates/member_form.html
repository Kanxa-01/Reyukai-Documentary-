{% extends "base.html" %}
{% block title %}{{ 'Edit' if member else 'Add' }} Member — Reyukai{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px;">
    <h1>{{ 'Edit Member (S.N. ' ~ member.id ~ ')' if member else 'Add Member' }}</h1>
    <form method="POST">
        <label>Full Name *</label>
        <input type="text" name="full_name" required value="{{ member.full_name if member else '' }}">

        <label>Address</label>
        <input type="text" name="address" value="{{ member.address if member else '' }}">

        <label>Oya No. (sponsor's S.N.)</label>
        <input type="number" name="oya_id" id="oya_id" min="1"
               placeholder="Enter the sponsor's S.N. number..."
               value="{{ member.oya_id if member and member.oya_id else '' }}">
        <div class="selected-oya" id="oya-status"></div>
        <div style="margin-top: 4px;">
            <a href="#" id="toggle-name-search" style="font-size: 0.82rem; color: var(--muted);">
                Don't know the number? Search by name instead
            </a>
        </div>
        <div class="autocomplete-wrap" id="name-search-wrap" style="display:none; margin-top: 8px;">
            <input type="text" id="oya-search" placeholder="Type a name to search existing members..." autocomplete="off">
            <div class="autocomplete-results" id="oya-results"></div>
        </div>

        <label>Entrance Date</label>
        <input type="date" name="entrance_date" value="{{ member.entrance_date.strftime('%Y-%m-%d') if member and member.entrance_date else '' }}">

        <label>Hozashu</label>
        <input type="text" name="hozashu" value="{{ member.hozashu if member else '' }}">

        <label>Jun-Shibicho</label>
        <input type="text" name="jun_shibicho" value="{{ member.jun_shibicho if member else '' }}">

        <label>Shibicho *</label>
        <input type="text" name="shibicho" required value="{{ member.shibicho if member else '' }}">

        <label>Valid Upto</label>
        <input type="date" name="valid_upto" value="{{ member.valid_upto.strftime('%Y-%m-%d') if member and member.valid_upto else '' }}">

        <label>Status</label>
        <select name="status">
            {% for s in ['Active', 'Expired', 'Suspended'] %}
            <option value="{{ s }}" {% if member and member.status == s %}selected{% elif not member and s == 'Active' %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>

        <label>Notes</label>
        <textarea name="notes" rows="3">{{ member.notes if member else '' }}</textarea>

        <div style="margin-top: 22px; display:flex; gap:10px;">
            <button type="submit" class="btn">{{ 'Save Changes' if member else 'Add Member' }}</button>
            <a href="{{ url_for('members_list') }}" class="btn-secondary btn">Cancel</a>
        </div>
    </form>
</div>

<script>
const oyaIdField = document.getElementById('oya_id');
const oyaStatus = document.getElementById('oya-status');
const shibichoField = document.querySelector('input[name="shibicho"]');
let lookupTimer;

function applyOyaResult(m) {
    oyaStatus.style.display = 'flex';
    oyaStatus.innerHTML = `Sponsor found: <b>${m.full_name}</b> (${m.shibicho})`;
    oyaStatus.style.color = 'var(--primary)';
    // Auto-fill Shibicho from the sponsor -- new members usually join under
    // the same Shibicho as whoever sponsored them. Only fills if currently
    // blank, so it never silently overwrites something you typed on purpose.
    if (shibichoField && !shibichoField.value.trim()) {
        shibichoField.value = m.shibicho;
    }
}

function lookupOyaById(id) {
    if (!id) { oyaStatus.style.display = 'none'; return; }
    fetch(`/api/members/${id}`)
        .then(r => {
            if (!r.ok) throw new Error('not found');
            return r.json();
        })
        .then(m => applyOyaResult(m))
        .catch(() => {
            oyaStatus.style.display = 'flex';
            oyaStatus.innerHTML = `No member found with S.N. ${id}`;
            oyaStatus.style.color = 'var(--error-text)';
        });
}

oyaIdField.addEventListener('input', () => {
    clearTimeout(lookupTimer);
    const id = oyaIdField.value.trim();
    lookupTimer = setTimeout(() => lookupOyaById(id), 350);
});

{% if member and member.oya %}
lookupOyaById({{ member.oya_id }});
{% endif %}

// Fallback: search by name, for when you don't know the S.N.
const toggleLink = document.getElementById('toggle-name-search');
const nameSearchWrap = document.getElementById('name-search-wrap');
const oyaSearch = document.getElementById('oya-search');
const oyaResults = document.getElementById('oya-results');
const excludeId = {{ member.id if member else 'null' }};
let debounceTimer;

toggleLink.addEventListener('click', (e) => {
    e.preventDefault();
    nameSearchWrap.style.display = nameSearchWrap.style.display === 'none' ? 'block' : 'none';
});

oyaSearch.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = oyaSearch.value.trim();
    if (q.length < 2) { oyaResults.style.display = 'none'; return; }
    debounceTimer = setTimeout(() => {
        let url = `/api/members/search?q=${encodeURIComponent(q)}`;
        if (excludeId) url += `&exclude_id=${excludeId}`;
        fetch(url)
            .then(r => r.json())
            .then(data => {
                oyaResults.innerHTML = '';
                if (data.length === 0) {
                    oyaResults.style.display = 'none';
                    return;
                }
                data.forEach(m => {
                    const div = document.createElement('div');
                    div.innerHTML = `${m.full_name} <span class="ac-shibicho">— S.N. ${m.id}, ${m.shibicho}</span>`;
                    div.onclick = () => {
                        oyaIdField.value = m.id;
                        applyOyaResult(m);
                        oyaResults.style.display = 'none';
                        oyaSearch.value = '';
                        nameSearchWrap.style.display = 'none';
                    };
                    oyaResults.appendChild(div);
                });
                oyaResults.style.display = 'block';
            });
    }, 250);
});

document.addEventListener('click', (e) => {
    if (!e.target.closest('.autocomplete-wrap')) oyaResults.style.display = 'none';
});
</script>
{% endblock %}
